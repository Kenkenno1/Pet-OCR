<script>
  // ══════════════════════════════════
  // ── Constants & Config ──
  // ══════════════════════════════════
  const STORAGE_KEY = 'ocr_gemini_api_key';
  const STORAGE_MODEL_KEY = 'ocr_gemini_model';
  const STORAGE_POLISH_KEY = 'ocr_polish_enabled';
  const STORAGE_LANG_KEY = 'ocr_target_language';
  const DEFAULT_MODEL = 'gemini-3.5-flash';
  const VALID_MODELS = ['gemini-3.5-flash', 'gemini-3.1-flash-lite'];
  const MODEL_MIGRATION = {
    'gemini-3.1-flash-lite-preview': 'gemini-3.1-flash-lite',
    'gemini-3-flash-preview': 'gemini-3.5-flash',
  };
  // 使用者只看到「快速 / 精緻」模式，技術型號對應在此（不在 UI 顯示型號）
  const MODE_MODELS = { quick: 'gemini-3.1-flash-lite', refined: 'gemini-3.5-flash' };
  const MAX_FILES = 30;
  const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10 MB
  const MAX_RETRIES = 3;
  const MAX_RESULT_CARDS = 20;

  // ══════════════════════════════════
  // ── DOM References ──
  // ══════════════════════════════════
  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  const statusText = document.getElementById('status-text');
  const queueGrid = document.getElementById('queue-grid');
  const queuePill = document.getElementById('queue-pill');
  const queueEmpty = document.getElementById('queue-empty');
  const batchCountEl = document.getElementById('batch-count');
  const resultsSection = document.getElementById('results-section');
  const progressContainer = document.getElementById('progress-container');
  const progressBar = document.getElementById('progress-bar');
  const toastContainer = document.getElementById('toast-container');
  const settingsModal = document.getElementById('settings-modal');
  const apiKeyInput = document.getElementById('api-key-input');
  const apiKeyCallout = document.getElementById('api-key-callout');
  const saveFeedback = document.getElementById('save-feedback');
  const btnTest = document.getElementById('btn-test');
  const btnEye = document.getElementById('btn-eye');
  const btnCancelBatch = document.getElementById('btn-cancel-batch');
  const polishToggleInput = document.getElementById('polish-toggle');
  const polishChip = document.getElementById('polish-chip');
  const polishChipLabel = document.getElementById('polish-chip-label');
  const targetLangSelect = document.getElementById('target-lang-select');
  const btnLangNext = document.getElementById('btn-lang-next');
  const btnModeBack = document.getElementById('btn-mode-back');

  // ══════════════════════════════════
  // ── State ──
  // ══════════════════════════════════
  let imageQueue = []; // { id, file, base64, mimeType, blobUrl }
  let renderedBlobUrls = new Set(); // blob URLs used in result cards — do NOT revoke
  let isProcessing = false;
  let queueIdCounter = 0;
  let queueEpoch = 0; // incremented on clearQueue to invalidate pending readers
  let pendingReaders = 0; // number of FileReaders still in-flight
  let lastUsedLang = '';
  let lastUsedModel = ''; // 最近一次批次使用的型號（供單卡再次潤稿沿用同模式）
  let batchAbortController = null; // AbortController for cancelling batch
  const FLOW_STATES = new Set(['empty', 'queued', 'mode', 'busy', 'done']);

  function setFlow(next) {
    if (!FLOW_STATES.has(next)) return;
    if (document.body.dataset.flow !== next) {
      document.body.dataset.flow = next;
    }
  }

  function hasResultCards() {
    return resultsSection.children.length > 0;
  }

  function settleFlowAfterQueueChange() {
    if (isProcessing) return;
    if (imageQueue.length === 0) {
      setFlow(hasResultCards() ? 'done' : 'empty');
    } else if (document.body.dataset.flow === 'busy' || document.body.dataset.flow === 'empty' || document.body.dataset.flow === 'done') {
      setFlow('queued');
    }
  }

  function onQueueItemAdded() {
    const flow = document.body.dataset.flow;
    if (flow === 'empty' || flow === 'done') setFlow('queued');
  }

  // ══════════════════════════════════
  // ── HTML Sanitizer (XSS Protection) ──
  // ══════════════════════════════════
  function sanitizeUrlAttribute(value, attrName) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    if (attrName === 'src' && /^\s*data\s*:\s*image\//i.test(raw)) return raw;
    try {
      const url = new URL(raw, window.location.href);
      const allowed = attrName === 'href' || attrName === 'xlink:href'
        ? ['http:', 'https:', 'mailto:', 'tel:']
        : ['http:', 'https:', 'blob:'];
      return allowed.includes(url.protocol) ? raw : '';
    } catch {
      return '';
    }
  }

  function sanitizeInlineStyle(value) {
    const css = String(value || '');
    if (/expression\s*\(|behavior\s*:|@import/i.test(css)) return '';
    // OCR layout relies on inline CSS, but CSS url() can leak via remote beacons.
    return css.replace(/url\s*\((?:[^)(]|\([^)]*\))*\)/gi, '');
  }

  function sanitizeHtml(dirty) {
    const template = document.createElement('template');
    template.innerHTML = dirty || '';

    const dangerousTags = 'script,iframe,object,embed,form,input,textarea,select,button,link,meta,base,applet,style,noscript,template,svg,math';
    template.content.querySelectorAll(dangerousTags).forEach(el => el.remove());

    template.content.querySelectorAll('*').forEach(el => {
      [...el.attributes].forEach(attr => {
        const name = attr.name.toLowerCase();
        if (name.startsWith('on')) {
          el.removeAttribute(attr.name);
          return;
        }
        if (['src', 'href', 'action', 'xlink:href'].includes(name)) {
          const clean = sanitizeUrlAttribute(attr.value, name);
          if (clean) el.setAttribute(attr.name, clean);
          else el.removeAttribute(attr.name);
          return;
        }
        if (name === 'style') {
          const clean = sanitizeInlineStyle(attr.value);
          if (clean.trim()) el.setAttribute(attr.name, clean);
          else el.removeAttribute(attr.name);
        }
      });
    });

    return template.innerHTML;
  }

  // ══════════════════════════════════
  // ── Safe API Response Parser ──
  // ══════════════════════════════════
  function extractModelText(data) {
    if (data?.error) {
      throw new Error(data.error.message || 'API error');
    }
    const candidates = data?.candidates;
    if (!candidates || candidates.length === 0) {
      const blockReason = data?.promptFeedback?.blockReason;
      throw new Error(blockReason ? `Blocked: ${blockReason}` : 'No candidates returned');
    }
    const candidate = candidates[0];
    if (candidate.finishReason === 'MAX_TOKENS') {
      throw new Error('回應被截斷（MAX_TOKENS），內容不完整');
    } else if (candidate.finishReason && candidate.finishReason !== 'STOP') {
      throw new Error(`Response filtered: ${candidate.finishReason}`);
    }
    const text = candidate?.content?.parts
      ?.map(part => part.text || '')
      .join('')
      .trim();
    if (!text) {
      throw new Error('Model returned empty text');
    }
    return text.replace(/```html|```/g, '').trim();
  }

  // ══════════════════════════════════
  // ── Centralized Gemini API Caller (with retries & backoff) ──
  // ══════════════════════════════════
  function getApiKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
  function refreshApiKeyCallout() {
    if (!apiKeyCallout) return;
    apiKeyCallout.hidden = !!getApiKey();
  }
  function getModel() {
    const stored = localStorage.getItem(STORAGE_MODEL_KEY);
    if (!stored) return DEFAULT_MODEL;
    const migrated = MODEL_MIGRATION[stored];
    if (migrated) {
      localStorage.setItem(STORAGE_MODEL_KEY, migrated);
      return migrated;
    }
    return VALID_MODELS.includes(stored) ? stored : DEFAULT_MODEL;
  }
  // 由已儲存型號推回「模式」：3.5→精緻；flash-lite / 無 / 無效 / 舊 pro-preview → 快速
  function getMode() {
    const stored = localStorage.getItem(STORAGE_MODEL_KEY);
    const resolved = MODEL_MIGRATION[stored] || stored;
    return resolved === 'gemini-3.5-flash' ? 'refined' : 'quick';
  }
  function getModeModel(mode) {
    return MODE_MODELS[mode] || MODE_MODELS.quick;
  }
  function getPolishEnabled() {
    const v = localStorage.getItem(STORAGE_POLISH_KEY);
    return v === null ? true : v === '1';
  }
  function setPolishEnabled(on) {
    localStorage.setItem(STORAGE_POLISH_KEY, on ? '1' : '0');
    syncPolishUi();
  }
  function syncPolishUi() {
    const on = getPolishEnabled();
    if (polishToggleInput) polishToggleInput.checked = on;
    if (polishChip) polishChip.classList.toggle('on', on);
    if (polishChipLabel) polishChipLabel.textContent = on ? '潤稿 開' : '潤稿 關';
    if (polishChip) polishChip.title = on
      ? '自動潤稿：開（點擊關閉以加速）'
      : '自動潤稿：關（點擊開啟以提升品質）';
  }
  function togglePolishEnabled() {
    const next = !getPolishEnabled();
    setPolishEnabled(next);
    showToast(next ? '🐶 汪！潤稿開。' : '🐱 喵，省一步。');
  }

  function abortableSleep(ms, signal) {
    return new Promise((resolve, reject) => {
      if (signal?.aborted) { reject(new DOMException('Aborted', 'AbortError')); return; }
      const timer = setTimeout(resolve, ms);
      signal?.addEventListener('abort', () => { clearTimeout(timer); reject(new DOMException('Aborted', 'AbortError')); }, { once: true });
    });
  }

  async function callGemini(parts, { signal, model: modelOverride, systemInstruction } = {}) {
    const key = getApiKey();
    const model = modelOverride || getModel();
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

    let lastError;
    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      if (signal?.aborted) throw new DOMException('Aborted', 'AbortError');

      try {
        const reqBody = { contents: [{ parts }] };
        if (systemInstruction) {
          reqBody.systemInstruction = { parts: [{ text: systemInstruction }] };
        }
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key },
          body: JSON.stringify(reqBody),
          signal,
        });

        // Retry on 429 / 502 / 503 with exponential backoff
        if (res.status === 429 || res.status === 502 || res.status === 503) {
          const wait = Math.min(1000 * Math.pow(2, attempt) + Math.random() * 500, 16000);
          await abortableSleep(wait, signal);
          lastError = new Error(`HTTP ${res.status} (retry ${attempt + 1}/${MAX_RETRIES})`);
          continue;
        }

        // Non-retryable client errors (400, 401, 403, 404…) — fail immediately
        if (res.status >= 400 && res.status < 500) {
          const data = await res.json().catch(() => ({}));
          const err = new Error(data?.error?.message || `HTTP ${res.status}`);
          err.nonRetryable = true;
          throw err;
        }

        const data = await res.json();
        return extractModelText(data);

      } catch (err) {
        if (err.name === 'AbortError') throw err;
        if (err.nonRetryable) throw err;
        lastError = err;
        if (attempt < MAX_RETRIES - 1) {
          const wait = Math.min(1000 * Math.pow(2, attempt), 8000);
          await abortableSleep(wait, signal);
        }
      }
    }
    throw lastError || new Error('Max retries exceeded');
  }

  // ══════════════════════════════════
  // ── Funny Reactions ──
  // ══════════════════════════════════
  const reactions = {
    'Traditional Chinese (Taiwan usage)': {
      start: [
        '翻譯大師出動！🔥', '開始施法：繁體化！✨', '台灣 NO.1！衝啊！🚀',

        '文字煉金術，開始！🧙', '吃我一記翻譯波動拳！👊',
      ],
      done: [

        '搞定！這翻譯品質，我自己都感動 🥲', '完美落地！裁判請給分！💯',
        '翻譯完畢，請簽收 📦', '任務完成！今天也是優秀的一天 ✌️',
        '交貨！品質保證，不滿意可以…再按一次 😏',
      ],

    },
    'English': {

  // ══════════════════════════════════
  function updateQueueUI() {
    const count = imageQueue.length;
    queuePill.textContent = count + (pendingReaders > 0 ? `+${pendingReaders}` : '');
    batchCountEl.innerHTML = count > 0 ? `待翻譯：<strong>${count}</strong> 張` : '';
    queueEmpty.style.display = count === 0 && pendingReaders === 0 ? 'block' : 'none';
    const btns = document.querySelectorAll('.action-btn');
    btns.forEach(btn => {
      if (count > 0 && !isProcessing && pendingReaders === 0) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    });
  }

  function addToQueue(file) {
    // ── File count limit（含 pending 中的）──
    if (imageQueue.length + pendingReaders >= MAX_FILES) {
      showToast(`最多 ${MAX_FILES} 張圖片！`);
      return;
    }
    // ── File size limit ──
    if (file.size > MAX_FILE_SIZE) {
      showToast(`${file.name} 超過 10MB，已跳過`);
      return;
    }

    const id = ++queueIdCounter;
    const blobUrl = URL.createObjectURL(file);
    const myEpoch = queueEpoch;
    pendingReaders++;
    updateQueueUI(); // disable buttons while readers pending

    const reader = new FileReader();
    reader.onloadend = () => {
      pendingReaders--;
      // 若 clearQueue 已被呼叫（epoch 變了），丟棄結果
      if (myEpoch !== queueEpoch) {
        try { URL.revokeObjectURL(blobUrl); } catch(e) {}
        updateQueueUI();
        return;
      }
      // 再次檢查上限（防止並行 readers 超額）
      if (imageQueue.length >= MAX_FILES) {
        try { URL.revokeObjectURL(blobUrl); } catch(e) {}
        showToast(`最多 ${MAX_FILES} 張圖片！`);
        updateQueueUI();
        return;
      }
      const base64 = reader.result.split(',')[1];
      let resolveSourceDimensions;
      const sourceDimensionsReady = new Promise(resolve => { resolveSourceDimensions = resolve; });
      const item = { id, file, base64, mimeType: file.type, blobUrl, sourceDimensionsReady };
      imageQueue.push(item);
      onQueueItemAdded();
      const el = document.createElement('div');
      el.className = 'queue-item';
      el.id = `queue-item-${id}`;
      const img = document.createElement('img');
      img.onload = () => resolveSourceDimensions(recordItemSourceDimensions(item, img));
      img.onerror = () => resolveSourceDimensions(0);
      img.src = blobUrl;
      img.alt = `圖片 ${id}`;
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.onclick = () => removeFromQueue(id);
      const numSpan = document.createElement('span');
      numSpan.className = 'item-number';
      numSpan.textContent = `#${imageQueue.length}`;
      el.append(img, removeBtn, numSpan);
      queueGrid.appendChild(el);
      updateQueueUI();
    };
    reader.readAsDataURL(file);
  }

  function removeFromQueue(id) {
    const removed = imageQueue.find(i => i.id === id);
    if (removed) {
      // Only revoke if NOT already used in a result card
      if (removed.blobUrl && !renderedBlobUrls.has(removed.blobUrl)) {
        try { URL.revokeObjectURL(removed.blobUrl); } catch(e) {}
      }
      removed.base64 = null;
      removed.file = null;
    }
    imageQueue = imageQueue.filter(i => i.id !== id);
    settleFlowAfterQueueChange();
    const el = document.getElementById(`queue-item-${id}`);
    if (el) {
      el.style.transition = 'all 0.25s';
      el.style.transform = 'scale(0) rotate(10deg)';
      el.style.opacity = '0';
      setTimeout(() => {
        el.remove();
        document.querySelectorAll('.queue-item .item-number').forEach((n, i) => {
          n.textContent = `#${i + 1}`;
        });
        updateQueueUI();
      }, 250);
    }
  }

  function clearQueue() {
    queueEpoch++; // invalidate any in-flight FileReaders
    imageQueue.forEach(item => {
      // Only revoke blob URLs NOT used in rendered result cards
      if (item.blobUrl && !renderedBlobUrls.has(item.blobUrl)) {
        try { URL.revokeObjectURL(item.blobUrl); } catch(e) {}
      }
      item.base64 = null;
      item.file = null;
    });
    imageQueue = [];
    queueIdCounter = 0;
    // pendingReaders 不歸零，讓 onloadend 自行遞減並因 epoch 不符而丟棄
    queueGrid.querySelectorAll('.queue-item').forEach(el => el.remove());
    updateQueueUI();
    settleFlowAfterQueueChange();
  }

  // ── Speech bubble system ──
  let speechQueue = [];
  let speechBusy = false;
  let speechEpoch = 0;  // race-condition guard

  async function addSpeech(who, text, duration) {
    return new Promise(resolve => {
      speechQueue.push({ who, text, duration: duration || 2800, resolve });
      if (!speechBusy) drainSpeechQueue();
    });
  }

  async function drainSpeechQueue() {
    if (speechBusy || speechQueue.length === 0) return;
    speechBusy = true;
    const myEpoch = speechEpoch;
    while (speechQueue.length > 0 && myEpoch === speechEpoch) {
      const { who, text, duration, resolve } = speechQueue.shift();
      await showBubble(who, text, duration);
      resolve();
    }
    if (myEpoch === speechEpoch) speechBusy = false;
  }

  function cycleBubble(limit = 2) {
    return new Promise(resolve => {
      if (speechArea.children.length < limit) {
        resolve();
        return;
      }
      const oldest = speechArea.children[0];
      if (!oldest) {
        resolve();
        return;
      }
      oldest.classList.add('fadeout');
      setTimeout(() => {
        if (oldest.parentNode) oldest.remove();
        resolve();
      }, 160);
    });
  }

  async function showBubble(who, text, duration) {
    await cycleBubble(2);
    return new Promise(resolve => {
      const isScanner = who === 'scanner';
      const bot = isScanner ? scannerBot : translatorBot;
      const otherBot = isScanner ? translatorBot : scannerBot;
      setRobotMood(bot, ['active', 'talking', isScanner ? 'looking-right' : 'looking-left']);
      setRobotMood(otherBot, ['idle', isScanner ? 'looking-left' : 'looking-right']);
      const bubble = document.createElement('div');
      bubble.className = `speech-bubble ${who}-bubble`;
      bubble.textContent = text;
      speechArea.appendChild(bubble);
      const talkTime = Math.min(text.length * 70, 1500);
      setTimeout(() => {
        setRobotMood(bot, ['active', 'happy', isScanner ? 'looking-right' : 'looking-left']);
      }, talkTime);
      setTimeout(resolve, duration);
    });
  }

  function clearAllBubbles() {

  function startIdleChat() {
    if (!idleChatPairs.length) return;
    if (_idleChatActive) return;
    _idleChatActive = true;
    const usedIndices = new Set();
    const schedule = () => {
      if (!_idleChatActive) return;
      const delay = 4000 + Math.random() * 4000;
      _idleChatTimer = setTimeout(async () => {
        if (!_idleChatActive) return;
        if (usedIndices.size >= idleChatPairs.length) usedIndices.clear();
        let idx;
        do { idx = Math.floor(Math.random() * idleChatPairs.length); } while (usedIndices.has(idx));
        usedIndices.add(idx);
        const pair = idleChatPairs[idx];
        for (const line of pair) {
          if (!_idleChatActive) return;
          await addSpeech(line.who, line.text, 2800);
        }
        schedule();
      }, delay);
    };
    schedule();
  }

    if (_idleChatTimer) { clearTimeout(_idleChatTimer); _idleChatTimer = null; }

  async function callGeminiOCR(base64Data, mimeType, signal, modelOverride, sourceWidth) {
    const sysInstr = `You are an expert Frontend Developer specializing in converting images to high-fidelity HTML.`;
    const normalizedSourceWidth = normalizeSourceLayoutWidth(sourceWidth);
    const widthContract = normalizedSourceWidth
      ? `\n6. The source image is ${normalizedSourceWidth}px wide. Wrap the entire reconstruction in exactly one outermost wrapper element with inline style="width: ${normalizedSourceWidth}px; margin: 0; box-sizing: border-box;". Use this exact pixel width and zero outer margins on that wrapper. Lay out the reconstruction across the available wrapper width according to the source image proportions; do not place the document inside a narrower column or leave artificial unused horizontal whitespace. Do not use %, vw, max-width, fit-content, or a narrower centered wrapper for the outermost document.`
      : '';
    const outputRuleNumber = normalizedSourceWidth ? 7 : 6;
    const prompt = `Convert this image to high-fidelity HTML.
Rules:
1. Use inline CSS for layout (flex/grid).
2. Match colors, fonts, and positions as closely as possible.
3. Preserve horizontal text as horizontal text. Japanese/Chinese/Korean language alone is NOT evidence of vertical writing.
4. Use CSS "writing-mode: vertical-rl" ONLY when the source image visibly shows top-to-bottom vertical columns. For ordinary news pages, lists, headlines, cards, captions, and paragraphs arranged in left-to-right horizontal rows, DO NOT use writing-mode or narrow one-character columns.
5. Avoid artificial narrow columns: give each text block enough width for normal words/phrases to wrap naturally.${widthContract}
${outputRuleNumber}. Return ONLY raw HTML string. No markdown, no code fences.`;

    return callGemini([
      { text: prompt },
      { inline_data: { mime_type: mimeType, data: base64Data } }
    ], { signal, model: modelOverride, systemInstruction: sysInstr });
  }

  async function callGeminiTranslate(html, lang, signal, modelOverride) {
    let localeRule = '';
    if (/chinese/i.test(lang)) {
      localeRule = '\n3. Use Taiwan Traditional Chinese phrasing (not Mainland China/HK usage).';
    } else if (/japanese/i.test(lang)) {
      localeRule = '\n3. Use natural, native Japanese (日本語) phrasing. Output MUST be in Japanese, NOT Chinese.';
    } else if (/english/i.test(lang)) {
      localeRule = '\n3. Use natural, fluent English phrasing.';
    } else {
      localeRule = `\n3. Use natural, native ${lang} phrasing.`;
    }
    const sysInstr = `You are a Localization Engineer. Your job is to translate HTML content while preserving all markup structure exactly.`;
    const prompt = `Target language: ${lang}.
Source HTML:
${html}
Rules:
1. Keep all HTML structure, classes, and inline styles EXACTLY the same.
2. Only translate visible text content.${localeRule}
4. Return ONLY raw HTML string. No markdown, no code fences.`;

    return callGemini([{ text: prompt }], { signal, model: modelOverride, systemInstruction: sysInstr });
  }

  async function callGeminiPolish(sourceHtml, translatedHtml, lang, signal, modelOverride) {
    const sysInstr = `You are a senior translation editor and quality assurance specialist. Your job is to polish and elevate existing translations through deep revision along three axes: Precision, Localization, and Fluency. You always keep the translation in its designated target language — never switch languages.`;
    let localeRule = '';
    if (/Traditional Chinese/i.test(lang)) {
      localeRule = '\n- For Traditional Chinese (Taiwan): use Taiwan-standard vocabulary, measure words, and expressions; strictly avoid Mainland China or Hong Kong phrasing';
    }
    const prompt = `Target language: ${lang}.
The revised translation MUST remain entirely in ${lang}. Never rewrite it into any other language. If any part of the current translation is in the wrong language, translate that part into ${lang}.

## Step 1: Deep Comprehension
First, carefully re-read the source text to fully understand:
- The overall meaning, intent, and nuance of the original
- Any domain-specific terminology or context
- The tone, register, and rhetorical purpose

## Source HTML (original text):
${sourceHtml}

## Current Translation (target language: ${lang}):
${translatedHtml}

## Step 2: Three-Axis Quality Enhancement
Revise the translation along these three axes:

### Axis 1 — Precision
- Fix any mistranslations, omissions, or additions
- Ensure numbers, proper nouns, and technical terms are correct
- Verify that the meaning faithfully reflects the source

### Axis 2 — Localization
- Use natural phrasing for the target locale of ${lang}${localeRule}
- Adapt cultural references, units, or idioms appropriately for the target audience

### Axis 3 — Fluency & Naturalness
- Ensure the text reads as if originally written in ${lang}
- Improve sentence rhythm, flow, and cohesion
- Remove translationese — awkward calques, unnatural word order, or overly literal constructions
- Maintain consistency in style and tone throughout

## Output Rules:
1. Keep ALL HTML structure, tags, classes, and inline styles EXACTLY the same as the current translation
2. Only modify the visible text content
3. The output language MUST be ${lang}
4. Return ONLY the revised raw HTML string. No markdown, no code fences, no explanations.`;

    return callGemini([{ text: prompt }], { signal, model: modelOverride, systemInstruction: sysInstr });
  }

  }

  // 兩顆主要 CTA：先選語言 → 點模式開始。mode 省略時（Ctrl+Enter）沿用最近 / 預設模式
  function startSelectedLanguageBatch(mode) {
    const chosen = (mode === 'quick' || mode === 'refined') ? mode : getMode();
    const model = getModeModel(chosen);
    localStorage.setItem(STORAGE_MODEL_KEY, model); // 記住模式對應型號（沿用舊 key，向後相容）
    syncModeUi(chosen);
    startBatch(getSelectedLanguage(), model);
  }

  btnLangNext?.addEventListener('click', () => {
    if (imageQueue.length > 0 && !isProcessing) setFlow('mode');
  });

  btnModeBack?.addEventListener('click', () => {
    if (imageQueue.length > 0 && !isProcessing) setFlow('queued');
  });

  async function startBatch(lang, modelOverride) {
    if (imageQueue.length === 0 || isProcessing) return;
    if (!getApiKey()) {
      showToast('先設定 API Key 啦！⚙️');
      shakeScreen();
      refreshApiKeyCallout();
      openSettings();
      return;
    }

    setFlow('busy');
    isProcessing = true;
    lastUsedLang = lang;
    lastUsedModel = modelOverride || getModel();
    if (targetLangSelect) localStorage.setItem(STORAGE_LANG_KEY, lang);
    batchAbortController = new AbortController();
    const signal = batchAbortController.signal;
    const r = getReaction(lang);
    const polishEnabled = getPolishEnabled();
    const stepsPerImage = polishEnabled ? 3 : 2; // OCR + Translate (+ Polish)
    const totalSteps = imageQueue.length * stepsPerImage;
    let completedSteps = 0;

    // Show cancel button
    btnCancelBatch.classList.add('visible');

    // Epic start reaction
    showToast(randomPick(r.start));
    if ((lastUsedModel || getModel()) === MODE_MODELS.refined) {
      showToast('精緻模式約需 3~5 分鐘，請稍候一下 ✨');
    }
    shakeScreen();

    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.classList.add('disabled', 'processing-btn');
    });

    progressContainer.classList.add('active');
    progressBar.style.width = '0%';

    const items = [...imageQueue];

    // Robots greet (awaited for ordering)
    await robotGreeting();

    let cancelled = false;

    for (let i = 0; i < items.length; i++) {
      if (signal.aborted) { cancelled = true; break; }

      const item = items[i];
      const queueEl = document.getElementById(`queue-item-${item.id}`);
      if (queueEl) queueEl.classList.add('processing');

      setStatus('spinner', `OCR 辨識中… (${i + 1}/${items.length})`);

      // Robot: OCR start (fire-and-forget, don't block API call)
      robotOcrStart(i + 1, items.length);

      let ocrHtml = '';
      try {
        const sourceWidth = await getItemSourceWidthForOcr(item);
        console.info(`[ocr] source-width contract: ${sourceWidth ? `${sourceWidth}px` : 'omitted (dimension unavailable)'}`);
        ocrHtml = await callGeminiOCR(item.base64, item.mimeType, signal, lastUsedModel, sourceWidth);
        completedSteps++;
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      } catch (err) {
        if (err.name === 'AbortError') { cancelled = true; break; }
        if (queueEl) queueEl.classList.remove('processing');
        await robotError(err.message);
        appendResultCard(item, `<div style="color:#c0392b">OCR 失敗：${escapeHtml(err.message)}</div>`, '', i + 1);
        completedSteps += stepsPerImage; // skip remaining steps for this image
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
        item.base64 = null;
        continue;
      }

      // Free base64 memory immediately after OCR
      item.base64 = null;

      // Robot: OCR done (fire-and-forget)
      robotOcrDone();

      if (signal.aborted) { cancelled = true; break; }

      setStatus('spinner', `翻譯中… (${i + 1}/${items.length})`);

      // Robot: Translate start (fire-and-forget)
      robotTranslateStart();

      let transHtml = '';
      let translationOk = false;
      try {
        transHtml = await callGeminiTranslate(ocrHtml, lang, signal, lastUsedModel);
        translationOk = true;
        completedSteps++;
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      } catch (err) {
        if (err.name === 'AbortError') { cancelled = true; break; }
        transHtml = `<div style="color:#c0392b">翻譯失敗：${escapeHtml(err.message)}</div>`;
        completedSteps += polishEnabled ? 2 : 1; // skip Translate (+ Polish)
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      }

      const finalOcr = ocrHtml;
      ocrHtml = null;

      // Robot: Translate done (fire-and-forget)
      robotTranslateDone();

      // ── Auto-polish ──
      let polished = false;
      if (polishEnabled && translationOk && !signal.aborted) {
        setStatus('spinner', `潤稿中… (${i + 1}/${items.length})`);
        // Robot: Polish start (fire-and-forget)
        robotPolishStart();
        try {
          const polishedHtml = await callGeminiPolish(finalOcr, transHtml, lang, signal, lastUsedModel);
          transHtml = polishedHtml;
          polished = true;
        } catch (err) {
          if (err.name === 'AbortError') { cancelled = true; break; }
          // Polish failed — keep original translation, not a fatal error
        }
        completedSteps++;
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      }

      if (queueEl) {
        queueEl.classList.remove('processing');
        queueEl.classList.add('done');
      }

      appendResultCard(item, finalOcr, transHtml, i + 1);

      // Mark polish indicator if polished
      if (polished) {
        const lastCard = resultsSection.lastElementChild;
        if (lastCard) {
          const polishInd = lastCard.querySelector('.polish-indicator');
          if (polishInd) polishInd.classList.add('visible');
          const polishBtn = lastCard.querySelector('.btn-polish');
          if (polishBtn) {
            polishBtn.classList.add('done-polish');
            polishBtn.innerHTML = '<span class="polish-icon">✨</span> 再次潤稿';
          }
        }
      }
    }

    // Hide cancel button
    btnCancelBatch.classList.remove('visible');

    if (cancelled) {
      setStatus('', '⏹ 已取消');
      showToast('批次已取消 ⏹');
      hideRobots();
    } else {
      // Epic done reaction
      setTimeout(() => {
        showToast(randomPick(r.done));
        spawnConfetti(20);
        emojiRain('🎉', 5);
      }, 300);
      // Robot: All done (awaited)
      await robotAllDone(items.length);
      setStatus('', `✓ 全部完成！共 ${items.length} 張`);
    }

    progressBar.style.width = '100%';
    setTimeout(() => { progressContainer.classList.remove('active'); }, 1500);

    isProcessing = false;
    batchAbortController = null;

    if (cancelled) {
      // Only remove processed/partial items; keep unprocessed items in queue
      const doneIds = new Set();
      queueGrid.querySelectorAll('.queue-item.done, .queue-item.processing').forEach(el => {
        const id = parseInt(el.id.replace('queue-item-', ''));
        if (!isNaN(id)) doneIds.add(id);
        el.remove();
      });
      imageQueue = imageQueue.filter(item => {
        if (doneIds.has(item.id)) {
          if (item.blobUrl && !renderedBlobUrls.has(item.blobUrl)) {
            try { URL.revokeObjectURL(item.blobUrl); } catch(e) {}
          }
          item.base64 = null;
          item.file = null;
          return false;
        }
        return true;
      });
      // Re-number remaining queue items
      document.querySelectorAll('.queue-item .item-number').forEach((n, i) => {
        n.textContent = `#${i + 1}`;
      });
      settleFlowAfterQueueChange();
    } else {
      clearQueue();
    }

    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.classList.remove('processing-btn');
    });
    updateQueueUI();
  }

  // ══════════════════════════════════
  // ── Result Card Rendering ──
  // ══════════════════════════════════
  function appendResultCard(item, ocrHtml, transHtml, index) {
    while (resultsSection.children.length >= MAX_RESULT_CARDS) {
      const oldest = resultsSection.children[0];
      const oldPanels = oldest.querySelector('.result-panels');
      if (oldPanels?.id) {
        delete syncState[oldPanels.id];
        delete cardViewState[oldPanels.id];
      }
      // Revoke blob URL used by this card to free memory
      const oldThumb = oldest.querySelector('.result-thumb');
      if (oldThumb?.src && oldThumb.src.startsWith('blob:')) {
        renderedBlobUrls.delete(oldThumb.src);
        try { URL.revokeObjectURL(oldThumb.src); } catch(e) {}
      }
      oldest.remove();
      showToast('已移除最舊的結果以節省記憶體 🗑️');
    }

    // Track this blob URL as "rendered" — do not revoke it
    if (item.blobUrl) renderedBlobUrls.add(item.blobUrl);

    // ── Sanitize model-generated HTML ──
    const safeOcrHtml = sanitizeHtml(ocrHtml);
    const safeTransHtml = sanitizeHtml(transHtml);

    const card = document.createElement('div');
    card.className = 'result-card';
    const cardId = `result-${Date.now()}-${index}`;
    card.dataset.lang = lastUsedLang;
    card.dataset.model = lastUsedModel; // 供單卡「再次潤稿」沿用同一模式型號

    card.innerHTML = `
      <div class="result-header">
        <img class="result-thumb" src="${item.blobUrl}" alt="">
        <div class="result-meta">圖片 #${index}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn-ghost" onclick="copyResult('${cardId}', 'ocr')">複製原文</button>
          <button class="btn-ghost" onclick="copyResult('${cardId}', 'trans')">複製譯文</button>
          <button class="btn-ghost" onclick="downloadResultImage('${cardId}', ${index}, event)">📥 下載圖</button>
        </div>
      </div>
      <div class="card-toolbar" data-card="${cardId}">
        <button type="button" class="zoom-btn" data-mode="fit-page">符合頁面</button>
        <button type="button" class="zoom-btn" data-mode="fit-width">符合寬度</button>
        <button type="button" class="zoom-btn" data-mode="actual">1:1</button>
        <input type="range" class="zoom-slider" min="50" max="200" step="5" value="100" aria-label="縮放">
        <span class="zoom-pct">100%</span>
        <button type="button" class="edit-hint" data-act="edit-fit">放大以編輯</button>
      </div>
      <div class="result-panels" id="${cardId}" data-layout="tb">
        <div class="result-panel" data-type="ocr">
          <div class="result-panel-label"><span class="dot" style="background:#aaa"></span>原文 OCR</div>
          <div class="panel-content" contenteditable="true" role="textbox" aria-label="原文 OCR" aria-multiline="true">${safeOcrHtml}</div>
        </div>
        <div class="result-panel" data-type="trans">
          <div class="result-panel-label" style="justify-content:space-between;">
            <span style="display:flex;align-items:center;gap:6px;">
              <span class="dot" style="background:var(--accent)"></span>譯文
              <span class="polish-indicator" id="polish-ind-${cardId}">✨ 已潤稿</span>
            </span>
            <button class="btn-polish" id="polish-btn-${cardId}" onclick="polishTranslation('${cardId}')">
              <span class="polish-icon">✨</span> 潤稿
            </button>
          </div>
          <div class="panel-content" contenteditable="true" role="textbox" aria-label="譯文" aria-multiline="true">${safeTransHtml}</div>
        </div>
      </div>
    `;
    resultsSection.appendChild(card);
    const sourceWidth = rememberCardSourceDimensions(card, item);
    stabilizeGeneratedLayout(card, sourceWidth);
    initCardView(cardId);
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setupSyncScroll(cardId);
    updateExportToolbar();
  }

  // ── 檢視/縮放狀態（per-card）──
  const cardViewState = {};
  const ZOOM_MIN = 0.5, ZOOM_MAX = 2.0, FIT_FLOOR = 0.05;
  const AUTO_LR_MIN_SCALE = 0.45;
  const AUTO_LR_TO_TB_SCALE = 0.43;
  const AUTO_TB_TO_LR_SCALE = 0.5;
  const MOBILE_FIT_MIN_SCALE = 0.65;
  const LAYOUT_MOBILE_QUERY = '(max-width: 860px)';
  const SOURCE_LAYOUT_MIN_W = 320;
  const SOURCE_LAYOUT_MAX_W = 2200;
  const CAPTURE_PANEL_X_PADDING = 40;
  const FALLBACK_CAPTURE_SINGLE_W = 800;
  const CAPTURE_CONTENT_MIN_W = 600;
  const CAPTURE_BBOX_MIN_INK_W = 64;
  const CAPTURE_CROP_MIN_GAIN = 0.10;
  const CAPTURE_CONTENT_COVERAGE = 0.98;

  function normalizeSourceLayoutWidth(value) {
    const width = Number(value);
    if (!Number.isFinite(width) || width <= 0) return 0;
    return Math.max(SOURCE_LAYOUT_MIN_W, Math.min(SOURCE_LAYOUT_MAX_W, Math.round(width)));
  }

  function normalizeSourceLayoutHeight(value) {
    const height = Number(value);
    return Number.isFinite(height) && height > 0 ? Math.round(height) : 0;
  }

  function recordItemSourceDimensions(item, img) {
    if (!item || !img) return 0;
    const sourceWidth = normalizeSourceLayoutWidth(img.naturalWidth);
    if (!sourceWidth) return 0;
    item.sourceWidth = sourceWidth;
    const sourceHeight = normalizeSourceLayoutHeight(img.naturalHeight);
    if (sourceHeight) item.sourceHeight = sourceHeight;
    return sourceWidth;
  }

  async function getItemSourceWidthForOcr(item) {
    let sourceWidth = normalizeSourceLayoutWidth(item?.sourceWidth);
    if (!sourceWidth && item?.sourceDimensionsReady) {
      try {
        sourceWidth = normalizeSourceLayoutWidth(await item.sourceDimensionsReady);
      } catch(e) {}
    }
    return sourceWidth || normalizeSourceLayoutWidth(item?.sourceWidth) || undefined;
  }

  function findResultPanels(scope) {
    return scope?.matches?.('.result-panels')
      ? scope
      : scope?.closest?.('.result-panels') || scope?.querySelector?.('.result-panels') || null;
  }

  function findResultCard(scope) {
    return scope?.matches?.('.result-card')
      ? scope
      : scope?.closest?.('.result-card') || scope?.querySelector?.('.result-card') || null;
  }

  function getSourceLayoutWidth(scope) {
    const panels = findResultPanels(scope);
    const card = findResultCard(scope);
    return normalizeSourceLayoutWidth(panels?.dataset.sourceWidth || card?.dataset.sourceWidth);
  }

  function setCardSourceDimensions(card, width, height) {
    const sourceWidth = normalizeSourceLayoutWidth(width);
    if (!card || !sourceWidth) return 0;
    const sourceHeight = normalizeSourceLayoutHeight(height);
    card.dataset.sourceWidth = String(sourceWidth);
    if (sourceHeight) card.dataset.sourceHeight = String(sourceHeight);
    const panels = card.querySelector('.result-panels');
    if (panels) {
      panels.dataset.sourceWidth = String(sourceWidth);
      if (sourceHeight) panels.dataset.sourceHeight = String(sourceHeight);
    }
    return sourceWidth;
  }

  function rememberCardSourceDimensions(card, item) {
    const knownWidth = setCardSourceDimensions(card, item?.sourceWidth, item?.sourceHeight);
    const thumb = card.querySelector('.result-thumb');
    const applyFromThumb = () => {
      const sourceWidth = recordItemSourceDimensions(item, thumb);
      if (!sourceWidth) return;
      setCardSourceDimensions(card, item.sourceWidth, item.sourceHeight);
      stabilizeGeneratedLayout(card, sourceWidth);
      const panels = card.querySelector('.result-panels');
      if (panels?.id && cardViewState[panels.id]) applyCardZoom(panels.id);
    };
    if (thumb) {
      if (thumb.complete && thumb.naturalWidth) applyFromThumb();
      else thumb.addEventListener('load', applyFromThumb, { once: true });
    }
    return knownWidth || getSourceLayoutWidth(card);
  }

  function isMobileLayout() {
    return window.matchMedia(LAYOUT_MOBILE_QUERY).matches;
  }

  function chooseAutoLayout(panels, contentWidth, currentLayout) {
    if (!panels || isMobileLayout()) return 'tb';
    const sourceWidth = getSourceLayoutWidth(panels);
    const layoutWidth = Math.max(contentWidth || 0, sourceWidth || 0);
    const availableHalfWidth = Math.max(1, panels.clientWidth / 2 - CAPTURE_PANEL_X_PADDING);
    const lrScale = Math.min(1, availableHalfWidth / Math.max(1, layoutWidth));
    if (currentLayout === 'lr') return lrScale < AUTO_LR_TO_TB_SCALE ? 'tb' : 'lr';
    if (currentLayout === 'tb') return lrScale > AUTO_TB_TO_LR_SCALE ? 'lr' : 'tb';
    return lrScale >= AUTO_LR_MIN_SCALE ? 'lr' : 'tb';
  }

  function getEffectiveLayout(scope, transOnly) {
    if (transOnly) return 'tb';
    const panels = findResultPanels(scope);
    return panels?.dataset.layout === 'lr' ? 'lr' : 'tb';
  }

  function getCaptureFrameWidth(scope, transOnly) {
    const layout = getEffectiveLayout(scope, transOnly);
    const sourceWidth = getSourceLayoutWidth(scope);
    const panelWidth = sourceWidth ? sourceWidth + CAPTURE_PANEL_X_PADDING : FALLBACK_CAPTURE_SINGLE_W;
    return layout === 'lr' ? panelWidth * 2 : panelWidth;
  }

  function applyCaptureLayoutStyle(clone, layout, width, transOnly) {
    if (transOnly) {
      clone.dataset.layout = 'tb';
      clone.style.cssText = `display:block;min-height:auto;width:${width}px;`;
      return;
    }
    const effective = layout === 'lr' ? 'lr' : 'tb';
    clone.dataset.layout = effective;
    const columns = effective === 'lr' ? '1fr 1fr' : '1fr';
    clone.style.cssText = `display:grid;grid-template-columns:${columns};min-height:auto;width:${width}px;`;
  }

  function recomputeSync(cardId) {
    const panels = document.getElementById(cardId);
    if (!panels) return;
    const ps = panels.querySelectorAll('.result-panel');
    const st = syncState[cardId];
    // 同步開啟時：取 source 側比例 → 套到對側，維持兩區同步（不能只 clamp）
    if (st && st.enabled && ps.length >= 2) {
      const src = (st.lastSource === 'trans') ? ps[1] : ps[0]; // 預設以 OCR(上) 為 source
      const dst = (src === ps[0]) ? ps[1] : ps[0];
      const srcMax = src.scrollHeight - src.clientHeight;
      const ratio = srcMax > 0 ? src.scrollTop / srcMax : 0;
      const dstMax = Math.max(0, dst.scrollHeight - dst.clientHeight);
      st.busy = true;
      dst.scrollTop = ratio * dstMax;
      requestAnimationFrame(() => { st.busy = false; });
    }
    // 最後 clamp 兩側 scrollTop 回合法範圍
    ps.forEach(p => {
      const max = Math.max(0, p.scrollHeight - p.clientHeight);
      if (p.scrollTop > max) p.scrollTop = max;
    });
  }

  function initCardView(cardId) {
    if (!cardViewState[cardId]) {
      const zoomMode = isMobileLayout() ? 'fit-width' : 'actual';
      cardViewState[cardId] = { zoomMode, scale: 1, layout: 'auto' };
    }
    applyCardZoom(cardId);
  }

  function applyCardZoom(cardId) {
    const panels = document.getElementById(cardId);
    const state = cardViewState[cardId];
    if (!panels || !state) return;
    const contents = panels.querySelectorAll('.panel-content');
    if (!contents.length) return;
    // 先還原 → 量測內容原始尺寸
    contents.forEach(pc => { pc.style.transform = ''; pc.style.transformOrigin = ''; pc.style.height = ''; });
    requestAnimationFrame(() => {
      let cW = 0, cH = 0;
      contents.forEach(pc => { cW = Math.max(cW, pc.scrollWidth); cH = Math.max(cH, pc.scrollHeight); });
      if (cW <= 0) return;
      // 只有 fit-page/fit-width 這種本來就會自動縮放的模式才允許排版跟著 resize 切換；
      // actual/manual 模式下版面要對齊使用者貼上的原圖尺寸，resize 不應改變左右/上下排列。
      if (state.zoomMode === 'fit-page' || state.zoomMode === 'fit-width') {
        state.layout = chooseAutoLayout(panels, cW, state.layout);
        panels.dataset.layout = state.layout;
      }
      cW = 0; cH = 0;
      contents.forEach(pc => { cW = Math.max(cW, pc.scrollWidth); cH = Math.max(cH, pc.scrollHeight); });
      const viewH = Math.max(window.innerHeight * 0.8, 240);
      // 固定使用 effective layout 後的 panel 寬算 scale，避免 live/export 不一致。
      const panelW = (panels.querySelector('.result-panel')?.clientWidth || panels.clientWidth) - 40;
      let scale;
      let fitWidthNeedsPan = false;
      switch (state.zoomMode) {
        case 'actual': scale = 1; break;
        case 'manual': scale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, state.scale)); break;
        case 'fit-width':
          scale = Math.min(1, panelW / cW);
          if (isMobileLayout() && scale < MOBILE_FIT_MIN_SCALE) {
            scale = MOBILE_FIT_MIN_SCALE;
            fitWidthNeedsPan = true;
          }
          break;
        default: scale = Math.max(FIT_FLOOR, Math.min(1, panelW / cW, viewH / cH)); // fit-page
      }
      state.scale = scale;
      contents.forEach(pc => {
        if (scale === 1) { pc.style.transform = ''; pc.style.transformOrigin = ''; pc.style.height = ''; }
        else {
          pc.style.transform = `scale(${scale})`;
          pc.style.transformOrigin = 'top left';
          pc.style.height = (pc.scrollHeight * scale) + 'px';
        }
      });
      // 讓結果欄自然長高，避免長圖在欄位內產生上下雙層捲動。
      const innerScroll = (state.zoomMode === 'actual' || state.zoomMode === 'manual');
      panels.querySelectorAll('.result-panel').forEach(p => {
        p.style.maxHeight = 'none';
        p.style.overflowX = (innerScroll || fitWidthNeedsPan) ? 'auto' : 'visible';
        p.style.overflowY = innerScroll ? 'auto' : 'visible';
      });
      updateZoomUI(cardId);
      if (typeof recomputeSync === 'function') recomputeSync(cardId);
    });
  }

  function updateZoomUI(cardId) {
    const state = cardViewState[cardId];
    const bar = document.querySelector(`.card-toolbar[data-card="${cardId}"]`);
    if (!state || !bar) return;
    bar.querySelectorAll('.zoom-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === state.zoomMode));
    const pct = bar.querySelector('.zoom-pct');
    if (pct) pct.textContent = Math.round(state.scale * 100) + '%';
    const slider = bar.querySelector('.zoom-slider');
    if (slider && state.zoomMode === 'manual') slider.value = Math.round(state.scale * 100);
    const hint = bar.querySelector('.edit-hint');
    if (hint && state.scale >= 1) hint.classList.remove('show');
  }

  function cssPx(value) {
    const match = String(value || '').trim().match(/^([\d.]+)px$/);
    return match ? Number(match[1]) : 0;
  }

  function stabilizeGeneratedLayout(scope, targetWidth) {
    const layoutWidth = normalizeSourceLayoutWidth(targetWidth) || getSourceLayoutWidth(scope);
    const contents = scope?.matches?.('.panel-content')
      ? [scope]
      : Array.from(scope?.querySelectorAll?.('.panel-content') || []);
    contents.forEach(pc => {
      let lockedChild = false;
      Array.from(pc.children).forEach(child => {
        const stableWidth = Math.max(cssPx(child.style.width), cssPx(child.style.maxWidth));
        if (stableWidth >= 600) {
          const lockWidth = layoutWidth || stableWidth;
          child.style.width = `${lockWidth}px`;
          child.style.maxWidth = `${lockWidth}px`;
          if (!child.style.boxSizing) child.style.boxSizing = 'border-box';
          lockedChild = true;
        }
      });
      if (layoutWidth && !lockedChild) {
        pc.style.width = `${layoutWidth}px`;
        pc.style.maxWidth = `${layoutWidth}px`;
        if (!pc.style.boxSizing) pc.style.boxSizing = 'border-box';
      }
    });
  }

  window.addEventListener('resize', () => {
    document.querySelectorAll('.result-panels').forEach(p => {
      if (p.id && cardViewState[p.id]) applyCardZoom(p.id);
    });
  });

  document.addEventListener('click', (e) => {
    const zb = e.target.closest('.card-toolbar .zoom-btn');
    if (zb) {
      const cardId = zb.closest('.card-toolbar').dataset.card;
      if (!cardViewState[cardId]) return;
      cardViewState[cardId].zoomMode = zb.dataset.mode;
      applyCardZoom(cardId);
      return;
    }
    const eh = e.target.closest('.card-toolbar .edit-hint');
    if (eh) {
      const cardId = eh.closest('.card-toolbar').dataset.card;
      if (!cardViewState[cardId]) return;
      cardViewState[cardId].zoomMode = 'fit-width';
      applyCardZoom(cardId);
      eh.classList.remove('show');
      return;
    }
  });
  document.addEventListener('input', (e) => {
    const slider = e.target.closest('.card-toolbar .zoom-slider');
    if (slider) {
      const cardId = slider.closest('.card-toolbar').dataset.card;
      const st = cardViewState[cardId];
      if (!st) return;
      st.zoomMode = 'manual';
      st.scale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, slider.value / 100));
      applyCardZoom(cardId);
      return;
    }
    // 手動編輯 contenteditable：內容變高時，於縮放模式(scale<1)下重算該 panel 高度。
    // 只調高度、不重設 transform → 不打斷打字 caret；scale=1 時高度為 auto，自然增長免處理。
    const pc = e.target.closest('.panel-content');
    if (pc) {
      const panels = pc.closest('.result-panels');
      const st = panels && cardViewState[panels.id];
      if (st && st.scale < 1) {
        requestAnimationFrame(() => { pc.style.height = (pc.scrollHeight * st.scale) + 'px'; });
      }
    }
  });

  document.addEventListener('focusin', (e) => {
    const pc = e.target.closest('.panel-content');
    if (!pc) return;
    const panels = pc.closest('.result-panels');
    if (!panels || !cardViewState[panels.id]) return;
    const bar = document.querySelector(`.card-toolbar[data-card="${panels.id}"]`);
    const hint = bar?.querySelector('.edit-hint');
    if (hint) hint.classList.toggle('show', cardViewState[panels.id].scale < 1);
  });

  // ══════════════════════════════════
  // ── Sync Scroll System ──
  // ══════════════════════════════════
  const syncState = {};

  function setupSyncScroll(cardId) {
    const container = document.getElementById(cardId);
    if (!container) return;
    const panels = container.querySelectorAll('.result-panel');
    if (panels.length < 2) return;
    const ocrPanel = panels[0];
    const transPanel = panels[1];
    syncState[cardId] = { enabled: true, busy: false };

    function getScrollRatio(el) {
      const maxScroll = el.scrollHeight - el.clientHeight;
      return maxScroll > 0 ? el.scrollTop / maxScroll : 0;
    }
    function applyScrollRatio(el, ratio) {
      const maxScroll = el.scrollHeight - el.clientHeight;
      el.scrollTop = ratio * maxScroll;
    }

    ocrPanel.addEventListener('scroll', () => {
      const s = syncState[cardId];
      if (!s || !s.enabled || s.busy) return;
      s.busy = true;
      s.lastSource = 'ocr';
      const ratio = getScrollRatio(ocrPanel);
      applyScrollRatio(transPanel, ratio);
      requestAnimationFrame(() => { s.busy = false; });
    });
    transPanel.addEventListener('scroll', () => {
      const s = syncState[cardId];
      if (!s || !s.enabled || s.busy) return;
      s.busy = true;
      s.lastSource = 'trans';
      const ratio = getScrollRatio(transPanel);
      applyScrollRatio(ocrPanel, ratio);
      requestAnimationFrame(() => { s.busy = false; });
    });
  }

  function toggleSync(cardId) {
    const s = syncState[cardId];
    if (!s) return;
    s.enabled = !s.enabled;
    const badge = document.getElementById(`sync-${cardId}`);
    if (badge) badge.classList.toggle('active', s.enabled);
    if (s.enabled) {
      const container = document.getElementById(cardId);
      if (container) {
        container.querySelectorAll('.result-panel').forEach(p => {
          p.classList.add('sync-flash');
          setTimeout(() => p.classList.remove('sync-flash'), 400);
        });
      }
      showToast('同步滾動：開啟 🔗');
    } else {
      showToast('同步滾動：關閉 🔓');
    }
  }

  // ══════════════════════════════════
  // ── Copy (with clipboard fallback) ──
  // ══════════════════════════════════
  async function copyResult(cardId, type) {
    const panel = document.querySelector(`#${cardId} [data-type="${type}"]`);
    if (!panel) return;
    const content = panel.cloneNode(true);
    content.querySelector('.result-panel-label')?.remove();
    try {
      if (window.ClipboardItem && navigator.clipboard?.write) {
        const blob = new Blob([content.innerHTML], { type: 'text/html' });
        const textBlob = new Blob([content.innerText], { type: 'text/plain' });
        await navigator.clipboard.write([
          new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })
        ]);
      } else {
        await navigator.clipboard.writeText(content.innerText);
      }
      showToast('已複製！📋');
    } catch {
      // Last-resort fallback
      try { await navigator.clipboard.writeText(content.innerText); showToast('已複製！📋'); }
      catch { showToast('複製失敗 😢'); }
    }
  }

  // ══════════════════════════════════
  // ── Fullscreen Viewer ──
  // ══════════════════════════════════
  const viewerOverlay = document.getElementById('viewer-overlay');
  const viewerBody = document.getElementById('viewer-body');
  let viewerSourceCard = null;
  let viewerSourceType = 'trans';

  function openViewer(panelEl) {
    const sourcePanel = panelEl?.closest?.('.result-panel') || panelEl;
    viewerSourceCard = sourcePanel?.closest?.('.result-card') || null;
    viewerSourceType = sourcePanel?.dataset?.type === 'ocr' ? 'ocr' : 'trans';
    const content = panelEl.cloneNode(true);
    // Remove label header from cloned content
    content.querySelectorAll('.result-panel-label').forEach(el => el.remove());
    content.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    viewerBody.innerHTML = content.innerHTML;
    viewerOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    // Focus the close button for keyboard accessibility
    const closeBtn = viewerOverlay.querySelector('.viewer-toolbar button');
    if (closeBtn) closeBtn.focus();
  }

  function closeViewer() {
    viewerOverlay.classList.remove('open');
    viewerBody.innerHTML = '';
    viewerSourceCard = null;
    viewerSourceType = 'trans';
    document.body.style.overflow = '';
  }

  async function shareViewerImage() {
    const shareBtn = viewerOverlay.querySelector('.viewer-toolbar button:last-child');
    if (shareBtn) { shareBtn.disabled = true; shareBtn.textContent = '處理中…'; }
    try {
      let canvas = null;
      if (viewerSourceCard?.isConnected) {
        canvas = await capturePanel(viewerSourceCard, viewerSourceType, {
          label: '分享圖片',
          targetPx: IMAGE_CAPTURE_TARGET_PX
        });
      }
      if (!canvas) {
        // Source card may have been removed while the viewer was open; keep the legacy viewer clone as a fallback.
        const clone = viewerBody.cloneNode(true);
        clone.style.cssText = 'font-family:"Noto Serif TC",serif;font-size:0.92rem;line-height:1.8;color:#1a1a1a;';
        prepareCloneForCapture(clone);
        canvas = await renderCloneToCanvas(clone, 1000, { label: '分享圖片', targetPx: IMAGE_CAPTURE_TARGET_PX });
      }

      const blob = await canvasToPngBlob(canvas, '分享圖片');
      if (!blob) { releaseCanvas(canvas); return; }
      releaseCanvas(canvas);
      const file = new File([blob], 'OCR_result.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'OCR 翻譯結果' });
      } else {
        // Fallback: download
        const link = document.createElement('a');
        link.download = 'OCR_result.png';
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('已下載圖片（此裝置不支援直接分享）');
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('Share failed:', err);
        showToast('分享失敗 😢');
      }
    }
    if (shareBtn) { shareBtn.disabled = false; shareBtn.textContent = '📤 分享'; }
  }

  // Delegate: tap on result-panel content opens viewer
  document.addEventListener('click', function(e) {
    const panel = e.target.closest('.result-panel');
    if (!panel) return;
    // Don't trigger on buttons, labels, editable areas, or interactive elements
    if (e.target.closest('button, .btn-polish, .result-panel-label, .polish-indicator, a, input, textarea, select, [contenteditable]')) return;
    // Only on mobile
    if (window.innerWidth > 860) return;
    openViewer(panel);
  });

  // ══════════════════════════════════
  // ── Download Result as Image ──
  // ══════════════════════════════════

  // Convert writing-mode:vertical elements to html2canvas-safe layout
  function flattenVerticalText(el) {
    el.querySelectorAll('*').forEach(node => {
      // Prioritize inline style (Gemini outputs inline CSS), fallback to computed
      const inlineWM = node.style.writingMode || '';
      let wm = inlineWM;
      if (!wm) {
        try { wm = window.getComputedStyle(node).writingMode || ''; } catch(e) {}
      }
      if (wm.includes('vertical')) {
        node.style.writingMode = 'horizontal-tb';
        node.style.textOrientation = 'mixed';
        // Preserve vertical appearance: render each character on its own line
        const text = node.textContent;
        if (text && node.children.length === 0 && text.trim().length > 0) {
          node.innerHTML = text.split('').map(ch =>
            ch === '\n' ? '<br>' : `<span style="display:block;text-align:center;line-height:1.3">${ch}</span>`
          ).join('');
          node.style.display = 'inline-block';
          node.style.verticalAlign = 'top';
        }
      }
    });
  }

  // ── 共用：把離螢幕截圖 clone 還原成「無縮放、可完整截圖」狀態 ──
  // 統一處理所有 html2canvas 匯出路徑，避免某條路徑漏清 live-view 的 transform。
  function relaxCaptureSourceWidthWrappers(clone) {
    clone.querySelectorAll('.panel-content').forEach(pc => {
      const sourceWidth = getSourceLayoutWidth(pc);
      if (!sourceWidth) return;
      Array.from(pc.children).forEach(child => {
        const declaredWidth = cssPx(child.style.width);
        if (!declaredWidth || Math.abs(declaredWidth - sourceWidth) > 2) return;
        child.style.width = '100%';
        child.style.maxWidth = '100%';
        child.style.marginLeft = '0';
        child.style.marginRight = '0';
      });
    });
  }

  function prepareCloneForCapture(clone) {
    relaxCaptureSourceWidthWrappers(clone);
    stabilizeGeneratedLayout(clone);
    clone.querySelectorAll('.result-panel').forEach(p => {
      p.style.maxHeight = 'none';
      p.style.overflow = 'visible';
      p.style.padding = '18px 20px';
      p.style.fontSize = '0.86rem';
    });
    clone.querySelectorAll('.panel-content').forEach(pc => {
      pc.style.transform = '';
      pc.style.transformOrigin = '';
      pc.style.height = '';
    });
    clone.querySelectorAll('.result-panel-label, .card-toolbar').forEach(el => el.remove());
    clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    flattenVerticalText(clone);
  }

  const CAPTURE_VISUAL_SELECTOR = 'img,svg,canvas,table,pre,video';

  function captureTextLength(node) {
    return String(node?.textContent || '').replace(/\s+/g, '').length;
  }

  function captureVisualCount(node) {
    if (!node) return 0;
    return (node.matches?.(CAPTURE_VISUAL_SELECTOR) ? 1 : 0) +
      node.querySelectorAll(CAPTURE_VISUAL_SELECTOR).length;
  }

  function findCaptureDocumentCandidate(pc, baselineContentWidth) {
    const totalText = captureTextLength(pc);
    const totalVisuals = captureVisualCount(pc);
    if (!totalText && !totalVisuals) return null;

    let best = null;
    pc.querySelectorAll('*').forEach(el => {
      const computed = getComputedStyle(el);
      const declaredWidth = Math.max(
        cssPx(el.style.width),
        cssPx(el.style.maxWidth),
        cssPx(computed.maxWidth)
      );
      if (declaredWidth < CAPTURE_CONTENT_MIN_W) return;

      const rect = el.getBoundingClientRect();
      if (!rect.width || rect.width >= baselineContentWidth * (1 - CAPTURE_CROP_MIN_GAIN)) return;

      const textCovered = !totalText || captureTextLength(el) >= totalText * CAPTURE_CONTENT_COVERAGE;
      const visualsCovered = !totalVisuals || captureVisualCount(el) >= totalVisuals;
      if (!textCovered || !visualsCovered) return;

      if (!best || rect.width > best.width) {
        best = { kind: 'declared', element: el, width: rect.width, height: rect.height, panel: pc, panelHeight: pc.scrollHeight };
      }
    });
    return best;
  }

  function pxNumber(value) {
    const number = Number.parseFloat(value);
    return Number.isFinite(number) ? number : 0;
  }

  function captureContentBoxLeft(pc) {
    const rect = pc.getBoundingClientRect();
    const computed = getComputedStyle(pc);
    return rect.left + pxNumber(computed.borderLeftWidth) + pxNumber(computed.paddingLeft);
  }

  function isCaptureInkElement(el, panelContentWidth = 0) {
    if (el.matches?.('pre')) return false;
    if (el.matches?.(CAPTURE_VISUAL_SELECTOR)) return true;
    const computed = getComputedStyle(el);
    const outOfFlow = computed.position === 'absolute' || computed.position === 'fixed';
    const explicitPxWidth = cssPx(el.style.width) > 0 || cssPx(el.style.maxWidth) > 0;
    const shrinkToFit = ['inline-block', 'inline-flex', 'inline-grid', 'inline-table', 'table'].includes(computed.display);
    const hasBackground = computed.backgroundImage !== 'none' ||
      (computed.backgroundColor && computed.backgroundColor !== 'rgba(0, 0, 0, 0)' && computed.backgroundColor !== 'transparent');
    const decorated = hasBackground ||
      pxNumber(computed.borderLeftWidth) > 0 || pxNumber(computed.borderRightWidth) > 0 ||
      pxNumber(computed.borderTopWidth) > 0 || pxNumber(computed.borderBottomWidth) > 0 ||
      (computed.boxShadow && computed.boxShadow !== 'none');
    const isFullWidthFlowBackground = hasBackground && !outOfFlow && !explicitPxWidth && !shrinkToFit &&
      panelContentWidth > 0 && el.getBoundingClientRect().width >= panelContentWidth - 2;
    if (isFullWidthFlowBackground) return false;
    return hasBackground || (decorated && (outOfFlow || explicitPxWidth || shrinkToFit));
  }

  function createCaptureInkProbe(pc, baselineContentWidth) {
    const ranges = [];
    const walker = document.createTreeWalker(pc, NodeFilter.SHOW_TEXT);
    let textNode;
    while ((textNode = walker.nextNode())) {
      const text = String(textNode.nodeValue || '');
      if (!text.trim() && !text.includes('\u00a0')) continue;
      const range = document.createRange();
      range.selectNodeContents(textNode);
      ranges.push(range);
    }
    const elements = Array.from(pc.querySelectorAll('*'))
      .filter(el => isCaptureInkElement(el, baselineContentWidth));

    const measure = () => {
      let minLeft = Infinity;
      let minTop = Infinity;
      let maxRight = -Infinity;
      let maxBottom = -Infinity;
      const includeRect = rect => {
        if (!rect || rect.width <= 0 || rect.height <= 0) return;
        minLeft = Math.min(minLeft, rect.left);
        minTop = Math.min(minTop, rect.top);
        maxRight = Math.max(maxRight, rect.right);
        maxBottom = Math.max(maxBottom, rect.bottom);
      };
      ranges.forEach(range => Array.from(range.getClientRects()).forEach(includeRect));
      elements.forEach(el => includeRect(el.getBoundingClientRect()));
      if (!Number.isFinite(minLeft) || !Number.isFinite(maxRight)) return null;
      return {
        minLeft,
        minTop,
        maxRight,
        maxBottom,
        width: maxRight - minLeft,
        height: maxBottom - minTop,
        requiredWidth: maxRight - captureContentBoxLeft(pc)
      };
    };
    return { measure };
  }

  function findCaptureInkCandidate(pc, baselineContentWidth) {
    const probe = createCaptureInkProbe(pc, baselineContentWidth);
    const ink = probe.measure();
    if (!ink || ink.width < CAPTURE_BBOX_MIN_INK_W || ink.requiredWidth <= 0) return null;
    if (ink.requiredWidth >= baselineContentWidth * (1 - CAPTURE_CROP_MIN_GAIN)) return null;
    return {
      kind: 'bbox',
      probe,
      width: Math.ceil(ink.width),
      inkWidth: ink.width,
      inkHeight: ink.height,
      panel: pc,
      panelHeight: pc.scrollHeight
    };
  }

  function setCaptureTrialWidth(clone, wrapper, layout, transOnly, contentWidth) {
    const columns = layout === 'lr' && !transOnly ? 2 : 1;
    const frameWidth = Math.ceil((contentWidth + CAPTURE_PANEL_X_PADDING) * columns);
    wrapper.style.width = `${frameWidth}px`;
    applyCaptureLayoutStyle(clone, layout, frameWidth, transOnly);
    clone.querySelectorAll('.panel-content').forEach(pc => {
      pc.style.width = `${contentWidth}px`;
      pc.style.maxWidth = `${contentWidth}px`;
      pc.style.boxSizing = 'border-box';
    });
    void clone.offsetWidth;
    return frameWidth;
  }

  function captureTrialPreservesLayout(clone, wrapper, candidates, contentWidth, frameWidth) {
    const contents = Array.from(clone.querySelectorAll('.panel-content'));
    const candidatesStable = candidates.every(candidate => {
      if (candidate.kind === 'bbox') {
        const ink = candidate.probe.measure();
        candidate.trialRequiredWidth = ink?.requiredWidth ?? Infinity;
        return ink &&
          Math.abs(ink.width - candidate.inkWidth) <= 0.5 &&
          Math.abs(ink.height - candidate.inkHeight) <= 1 &&
          ink.requiredWidth <= contentWidth + 1 &&
          Math.abs(candidate.panel.scrollHeight - candidate.panelHeight) <= 1;
      }
      const rect = candidate.element.getBoundingClientRect();
      return rect.width >= candidate.width - 0.25 &&
        Math.abs(rect.height - candidate.height) <= 0.5 &&
        Math.abs(candidate.panel.scrollHeight - candidate.panelHeight) <= 1;
    });
    const contentsFit = contents.every(pc => pc.scrollWidth <= contentWidth + 1);
    return candidatesStable && contentsFit && clone.scrollWidth <= frameWidth + 1 && wrapper.scrollWidth <= frameWidth;
  }

  async function refineCaptureFrame(clone, wrapper, baselineWrapW, { layout = 'tb', transOnly = false } = {}) {
    delete clone.dataset.captureFrameCropped;
    delete clone.dataset.captureFrameMode;
    const contents = Array.from(clone.querySelectorAll('.panel-content'));
    if (!contents.length) return baselineWrapW;

    const columns = layout === 'lr' && !transOnly ? 2 : 1;
    const baselineContentWidth = Math.max(
      CAPTURE_CONTENT_MIN_W,
      Math.round(baselineWrapW / columns - CAPTURE_PANEL_X_PADDING)
    );
    const candidates = contents.map(pc =>
      findCaptureDocumentCandidate(pc, baselineContentWidth) || findCaptureInkCandidate(pc, baselineContentWidth)
    );
    if (candidates.some(candidate => !candidate)) return baselineWrapW;
    const cropMode = candidates.every(candidate => candidate.kind === 'declared') ? 'declared' : 'bbox';

    const originalCloneStyle = clone.style.cssText;
    const originalLayout = clone.dataset.layout;
    const originalContentStyles = contents.map(pc => ({
      width: pc.style.width,
      maxWidth: pc.style.maxWidth,
      boxSizing: pc.style.boxSizing
    }));
    const restoreBaseline = () => {
      wrapper.style.width = `${baselineWrapW}px`;
      clone.style.cssText = originalCloneStyle;
      if (originalLayout == null) delete clone.dataset.layout;
      else clone.dataset.layout = originalLayout;
      contents.forEach((pc, index) => {
        pc.style.width = originalContentStyles[index].width;
        pc.style.maxWidth = originalContentStyles[index].maxWidth;
        pc.style.boxSizing = originalContentStyles[index].boxSizing;
      });
      delete clone.dataset.captureFrameMode;
      void clone.offsetWidth;
    };

    let low = Math.ceil(Math.max(...candidates.map(candidate => candidate.width)));
    let high = baselineContentWidth;
    let bestPassing = null;
    while (low < high) {
      const mid = Math.floor((low + high) / 2);
      const trialFrame = setCaptureTrialWidth(clone, wrapper, layout, transOnly, mid);
      if (captureTrialPreservesLayout(clone, wrapper, candidates, mid, trialFrame)) {
        bestPassing = mid;
        const currentRequiredWidth = Math.ceil(Math.max(...candidates.map(candidate =>
          candidate.kind === 'bbox' ? candidate.trialRequiredWidth : mid
        )));
        high = Math.max(low, Math.min(mid, currentRequiredWidth));
      } else {
        low = mid + 1;
      }
    }

    let refinedContentWidth = low;
    let refinedWrapW = setCaptureTrialWidth(clone, wrapper, layout, transOnly, refinedContentWidth);
    let layoutPreserved = captureTrialPreservesLayout(clone, wrapper, candidates, refinedContentWidth, refinedWrapW);
    if (!layoutPreserved && bestPassing != null && bestPassing > refinedContentWidth) {
      let retryLow = refinedContentWidth + 1;
      let retryHigh = bestPassing;
      let retryBest = bestPassing;
      while (retryLow <= retryHigh) {
        const mid = Math.floor((retryLow + retryHigh) / 2);
        const trialFrame = setCaptureTrialWidth(clone, wrapper, layout, transOnly, mid);
        if (captureTrialPreservesLayout(clone, wrapper, candidates, mid, trialFrame)) {
          retryBest = mid;
          retryHigh = mid - 1;
        } else {
          retryLow = mid + 1;
        }
      }
      refinedContentWidth = retryBest;
      refinedWrapW = setCaptureTrialWidth(clone, wrapper, layout, transOnly, refinedContentWidth);
      layoutPreserved = captureTrialPreservesLayout(clone, wrapper, candidates, refinedContentWidth, refinedWrapW);
    }
    const gain = (baselineWrapW - refinedWrapW) / baselineWrapW;
    if (gain < CAPTURE_CROP_MIN_GAIN || !layoutPreserved) {
      restoreBaseline();
      return baselineWrapW;
    }

    await yieldToUi(20);
    clone.dataset.captureFrameMode = cropMode;
    console.info(`[export] framing (${cropMode}): ${baselineWrapW}px → ${refinedWrapW}px (${Math.round(gain * 100)}% crop)`);
    return refinedWrapW;
  }

  const MAX_EXPORT_CANVAS_AREA = 14_260_634; // 85% headroom below the 16.7 MP hard edge
  const MAX_EXPORT_CANVAS_EDGE = 16384;
  const CAPTURE_MAX_SCALE = 6;
  const PDF_CAPTURE_TARGET_PX = 1700;
  const IMAGE_CAPTURE_TARGET_PX = 1600;

  function canvasPixelArea(width, height) {
    return Math.max(0, width || 0) * Math.max(0, height || 0);
  }

  function computeCaptureScale(width, height, targetPx = IMAGE_CAPTURE_TARGET_PX, maxScale = CAPTURE_MAX_SCALE) {
    const w = Math.max(1, Math.ceil(width || 1));
    const h = Math.max(1, Math.ceil(height || 1));
    const targetScale = targetPx > 0 ? targetPx / w : maxScale;
    const areaScale = Math.sqrt(MAX_EXPORT_CANVAS_AREA / Math.max(1, w * h));
    const edgeScale = Math.min(MAX_EXPORT_CANVAS_EDGE / w, MAX_EXPORT_CANVAS_EDGE / h);
    return Math.max(0.1, Math.min(maxScale, targetScale, areaScale, edgeScale));
  }

  function yieldToUi(ms = 30) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  let exportQueue = Promise.resolve();
  let exportQueueActive = false;
  let exportQueuePending = 0;

  function queueExportJob(label, task) {
    const shouldWait = exportQueueActive || exportQueuePending > 0;
    exportQueuePending++;
    if (shouldWait) showToast(`${label} 已排入下載佇列，請稍候…`);
    const run = exportQueue.catch(() => {}).then(async () => {
      exportQueuePending = Math.max(0, exportQueuePending - 1);
      exportQueueActive = true;
      try {
        return await task();
      } finally {
        exportQueueActive = false;
      }
    });
    exportQueue = run.catch(() => {});
    return run;
  }

  async function renderCloneToCanvas(clone, wrapW, { label = '截圖', targetPx = IMAGE_CAPTURE_TARGET_PX, maxScale = CAPTURE_MAX_SCALE, adaptiveFrame = null } = {}) {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `position:fixed;left:-9999px;top:0;width:${wrapW}px;z-index:-1;background:#fff;`;
    wrapper.appendChild(clone);
    document.body.appendChild(wrapper);
    try {
      await yieldToUi(50);
      const effectiveWrapW = adaptiveFrame
        ? await refineCaptureFrame(clone, wrapper, wrapW, adaptiveFrame)
        : wrapW;
      const width = Math.max(1, Math.ceil(clone.scrollWidth || effectiveWrapW || 1));
      const height = Math.max(1, Math.ceil(clone.scrollHeight || clone.getBoundingClientRect().height || 1));
      const scale = computeCaptureScale(width, height, targetPx, maxScale);
      const t0 = performance.now();
      console.info(`[export] ${label}: ${width}x${height} scale ${scale.toFixed(2)}`);
      const canvas = await html2canvas(clone, {
        scale,
        useCORS: true,
        backgroundColor: '#ffffff',
        scrollX: 0,
        scrollY: 0,
        width,
        height
      });
      canvas.__captureFrameMode = clone.dataset.captureFrameMode || '';
      canvas.__capturePreferLandscape = canvas.__captureFrameMode === 'declared';
      console.info(`[export] ${label}: ${canvas.width}x${canvas.height} in ${Math.round(performance.now() - t0)}ms`);
      return canvas;
    } finally {
      if (wrapper.parentNode) document.body.removeChild(wrapper);
    }
  }

  function releaseCanvas(canvas) {
    if (!canvas) return;
    canvas.width = 0;
    canvas.height = 0;
  }

  function releaseCanvases(canvases) {
    canvases.forEach(releaseCanvas);
  }

  function isExportCanvasTooLarge(width, height) {
    return width > MAX_EXPORT_CANVAS_EDGE ||
      height > MAX_EXPORT_CANVAS_EDGE ||
      canvasPixelArea(width, height) > MAX_EXPORT_CANVAS_AREA;
  }

  function showCanvasTooLarge(label, width, height) {
    console.warn(`${label}: canvas ${width}x${height} exceeds export limit`);
    showToast(`${label} 圖片尺寸過大，請改用 PDF、ZIP 或僅匯出譯文 ⚠️`);
  }

  async function canvasToPngBlob(canvas, label) {
    if (!canvas) return null;
    if (isExportCanvasTooLarge(canvas.width, canvas.height)) {
      showCanvasTooLarge(label, canvas.width, canvas.height);
      return null;
    }
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    if (!blob) {
      console.warn(`${label}: canvas.toBlob returned null for ${canvas.width}x${canvas.height}`);
      showToast(`${label} 圖片產生失敗，可能是瀏覽器記憶體不足 ⚠️`);
      return null;
    }
    return blob;
  }

  async function downloadResultImage(cardId, index, event) {
    const container = document.getElementById(cardId);
    if (!container) return;
    const btn = event?.target?.closest('.btn-ghost');
    if (btn) { btn.disabled = true; btn.textContent = '擷取中…'; }

    // Create offscreen clone at desktop width for full capture
    const layout = getEffectiveLayout(container, false);
    const wrapW = getCaptureFrameWidth(container, false);
    const clone = container.cloneNode(true);
    clone.id = '';
    applyCaptureLayoutStyle(clone, layout, wrapW, false);
    prepareCloneForCapture(clone);

    try {
      const canvas = await renderCloneToCanvas(clone, wrapW, {
        label: `下載圖 #${index}`,
        targetPx: IMAGE_CAPTURE_TARGET_PX,
        adaptiveFrame: { layout, transOnly: false }
      });
      const blob = await canvasToPngBlob(canvas, '下載圖');
      if (!blob) { releaseCanvas(canvas); return; }
      releaseCanvas(canvas);
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `OCR_result_${index}.png`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
      showToast('圖片已下載！📥');

      console.error('Download failed:', err);
      showToast('下載失敗 😢');
    }
    if (btn) { btn.disabled = false; btn.textContent = '📥 下載圖'; }
  }

  function setStatus(type, msg) {
    if (type === 'spinner') {
      const raw = String(msg || '');
      const match = raw.match(/^(.+?)…?\s*(\(.+\))?$/);
      const main = match ? match[1] : raw;
      const detail = match?.[2] || '';
      statusText.className = `status-active${main.startsWith('翻譯中') ? ' status-translate' : ''}`;
      statusText.innerHTML = `
        <div class="spinner"></div>
        <span class="status-copy">
          <span class="status-main">${escapeHtml(main)}</span>
          ${detail ? `<span class="status-detail">${escapeHtml(detail)}</span>` : ''}
        </span>`;
    } else if (type === 'error') {
      statusText.className = '';
      statusText.innerHTML = `<span style="color:#c0392b">${escapeHtml(msg)}</span>`;
    } else {
      statusText.className = '';
      statusText.textContent = msg;
    }

  async function capturePanel(card, type, options = {}) {
    const panels = card.querySelector('.result-panels');
    if (!panels) return null;
    const panelType = type === 'ocr' ? 'ocr' : 'trans';
    const clone = panels.cloneNode(true);
    const removeType = panelType === 'ocr' ? 'trans' : 'ocr';
    const otherPanel = clone.querySelector(`[data-type="${removeType}"]`);
    if (otherPanel) otherPanel.remove();

    applyCaptureLayoutStyle(clone, 'tb', wrapW, true);
    prepareCloneForCapture(clone);
    return renderCloneToCanvas(clone, wrapW, {
      label: options.label || (panelType === 'ocr' ? '原文頁' : '譯文頁'),
      targetPx: options.targetPx || PDF_CAPTURE_TARGET_PX,
      maxScale: options.maxScale ?? CAPTURE_MAX_SCALE,

    });

  function getResultCards() {

  function normalizeCanvasStack(canvases) {
    const valid = canvases.filter(c => c && c.width > 0 && c.height > 0);
    if (!valid.length) return [];
    const width = Math.max(...valid.map(c => c.width));
    return valid.map(canvas => ({
      canvas,
      width,
      height: Math.max(1, Math.round(canvas.height * (width / canvas.width)))
    }));
  }

  async function buildMergedCanvas(canvases, label) {
    const parts = normalizeCanvasStack(canvases);
    if (!parts.length) return null;
    const totalW = Math.max(...parts.map(p => p.width));
    const totalH = parts.reduce((sum, p) => sum + p.height, 0);
    if (totalH > MAX_EXPORT_CANVAS_EDGE) {
      showToast('圖片過多，合併高度超出上限，請改用 PDF 或 ZIP 匯出 ⚠️');
      return null;
    }
    if (isExportCanvasTooLarge(totalW, totalH)) {
      showCanvasTooLarge(label, totalW, totalH);
      return null;
    }
    const merged = document.createElement('canvas');
    merged.width = totalW;
    merged.height = totalH;
    const ctx = merged.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, totalW, totalH);
    let y = 0;
    for (const part of parts) {
      ctx.drawImage(part.canvas, 0, y, part.width, part.height);
      y += part.height;
    }
    return merged;
  }
