  function getPdfPageSpec(canvas) {
    const portrait = !canvas.__capturePreferLandscape && canvas.height >= canvas.width;
    return {
      pageW: portrait ? 210 : 297,
      pageH: portrait ? 297 : 210,
      orientation: portrait ? 'portrait' : 'landscape'
    };
  }

  function startOrAddPdfPage(pdf, jsPDF, spec) {
    if (!pdf) {
      return new jsPDF({ unit: 'mm', format: [spec.pageW, spec.pageH], orientation: spec.orientation });
    }
    pdf.addPage([spec.pageW, spec.pageH], spec.orientation);
    return pdf;
  }

  function addCanvasToPdf(pdf, jsPDF, canvas) {
    const spec = getPdfPageSpec(canvas);
    const margin = 5;
    const usableW = spec.pageW - margin * 2;
    const usableH = spec.pageH - margin * 2;
    const finalW = canvas.width;
    const finalH = canvas.height;
    const scaledW = usableW;
    const scaledH = (finalH / finalW) * usableW;
    let pagesAdded = 0;

    if (scaledH <= usableH) {
      const imgData = canvas.toDataURL('image/jpeg', 0.9);
      pdf = startOrAddPdfPage(pdf, jsPDF, spec);
      pdf.addImage(imgData, 'JPEG', margin, margin, scaledW, scaledH);
      return { pdf, pagesAdded: 1 };
    }

    const pxPerMm = finalW / usableW;
    const sliceH = usableH * pxPerMm;
    let srcY = 0;
    while (srcY < finalH) {
      const thisSliceH = Math.min(sliceH, finalH - srcY);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = finalW;
      sliceCanvas.height = Math.ceil(thisSliceH);
      const ctx = sliceCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
      ctx.drawImage(canvas, 0, srcY, finalW, thisSliceH, 0, 0, finalW, thisSliceH);
      const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.9);
      const sliceMmH = thisSliceH / pxPerMm;
      pdf = startOrAddPdfPage(pdf, jsPDF, spec);
      pdf.addImage(sliceData, 'JPEG', margin, margin, scaledW, sliceMmH);
      releaseCanvas(sliceCanvas);
      pagesAdded++;
      srcY += thisSliceH;
    }
    return { pdf, pagesAdded };
  }

  // --- Export: PDF (one source panel page, then one translation panel page) ---
  function exportPdf(transOnly) {
    return queueExportJob(transOnly ? '譯文 PDF' : 'PDF', () => runExportPdf(transOnly));
  }

  async function runExportPdf(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('PDF 產生中…⏳');
    try {
      const jspdfModule = window.jspdf;
      const jsPDF = jspdfModule?.jsPDF;
      if (!jsPDF) { showToast('jsPDF 載入失敗 ❌'); return; }
      let pdf = null;
      let failCount = 0;
      let pageCount = 0;
      const panelTypes = transOnly ? ['trans'] : ['ocr', 'trans'];

      for (let i = 0; i < cards.length; i++) {
        for (const type of panelTypes) {
          let canvas = null;
          try {
            const label = type === 'ocr' ? '原文' : '譯文';
            canvas = await capturePanel(cards[i], type, {
              label: `PDF 圖片 #${i + 1} ${label}`,
              targetPx: PDF_CAPTURE_TARGET_PX
            });
            if (!canvas) { failCount++; continue; }
            if (isExportCanvasTooLarge(canvas.width, canvas.height)) {
              showCanvasTooLarge(`PDF 圖片 #${i + 1} ${label}`, canvas.width, canvas.height);
              failCount++;
              continue;
            }
            const added = addCanvasToPdf(pdf, jsPDF, canvas);
            pdf = added.pdf;
            pageCount += added.pagesAdded;
          } catch (cardErr) {
            console.warn(`PDF: card ${i + 1} panel ${type} failed, skipping:`, cardErr);
            failCount++;
          } finally {
            releaseCanvas(canvas);
            await yieldToUi(20);
          }
        }
      }
      if (!pdf) { showToast('所有卡片截圖均失敗 ❌'); return; }
      const blob = pdf.output('blob');
      const pdfName = transOnly ? 'OCR_translated.pdf' : 'OCR_results.pdf';
      await saveFile(blob, pdfName, 'application/pdf', '.pdf');
      if (failCount > 0) {
        showToast(`PDF 已匯出（${pageCount} 頁完成，${failCount} 項跳過）⚠️`);
      } else {
        showToast(`PDF 已匯出（${pageCount} 頁）📄`);
      }
    } catch (err) {
      console.error('PDF export error:', err);
      showToast('PDF 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: PPTX ---
  async function exportPptx(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('PPTX 產生中…⏳');
    try {
      const slideW = 10;
      const maxSlideH = 56;
      // 第一輪：收集所有 canvas 資料
      const slides = [];
      for (const card of cards) {
        const canvas = await captureCard(card, transOnly);
        if (!canvas) continue;
        if (isExportCanvasTooLarge(canvas.width, canvas.height)) {
          showCanvasTooLarge('PPTX', canvas.width, canvas.height);
          releaseCanvas(canvas);
          continue;
        }
        const imgData = canvas.toDataURL('image/png');
        const naturalSlideH = (canvas.height / canvas.width) * slideW;
        const fitScale = Math.min(1, maxSlideH / naturalSlideH);
        const imageW = slideW * fitScale;
        const slideH = naturalSlideH * fitScale;
        slides.push({ imgData, slideH, imageW, imageX: (slideW - imageW) / 2 });
        releaseCanvas(canvas);
      }
      if (!slides.length) { showToast('截圖失敗 ❌'); return; }
      // 用最大高度統一 layout
      const maxH = Math.max(...slides.map(s => s.slideH), 5.63);
      const pptx = new PptxGenJS();
      pptx.defineLayout({ name: 'CUSTOM', width: slideW, height: maxH });
      pptx.layout = 'CUSTOM';
      // 第二輪：建立投影片
      for (const s of slides) {
        const slide = pptx.addSlide();
        slide.addImage({ data: s.imgData, x: s.imageX, y: 0, w: s.imageW, h: s.slideH });
      }
      const blob = await pptx.write({ outputType: 'blob' });
      const pptxName = transOnly ? 'OCR_translated.pptx' : 'OCR_results.pptx';
      await saveFile(blob, pptxName, 'application/vnd.openxmlformats-officedocument.presentationml.presentation', '.pptx');
    } catch (err) {
      console.error('PPTX export error:', err);
      showToast('PPTX 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: DOCX ---
  async function exportDocx(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('DOCX 產生中…⏳');
    try {
      const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, PageBreak } = docx;
      const children = [];
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        const transPanel = card.querySelector('[data-type="trans"] .panel-content');
        const transText = transPanel ? transPanel.innerText : '';
        const transParas = transText.split('\n').filter(l => l.trim()).map(l => new Paragraph({ children: [new TextRun(l)] }));
        if (transOnly) {
          children.push(
            new Paragraph({ children: [new TextRun({ text: `圖片 #${i + 1}`, bold: true, size: 28 })] }),
            ...(transParas.length ? transParas : [new Paragraph('')])
          );
        } else {
          const ocrPanel = card.querySelector('[data-type="ocr"] .panel-content');
          const ocrText = ocrPanel ? ocrPanel.innerText : '';
          const ocrParas = ocrText.split('\n').filter(l => l.trim()).map(l => new Paragraph({ children: [new TextRun(l)] }));
          const headerRow = new TableRow({
            children: [
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: '原文 OCR', bold: true })] })], width: { size: 50, type: WidthType.PERCENTAGE } }),
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: '譯文', bold: true })] })], width: { size: 50, type: WidthType.PERCENTAGE } }),
            ]
          });
          const contentRow = new TableRow({
            children: [
              new TableCell({ children: ocrParas.length ? ocrParas : [new Paragraph('')], width: { size: 50, type: WidthType.PERCENTAGE } }),
              new TableCell({ children: transParas.length ? transParas : [new Paragraph('')], width: { size: 50, type: WidthType.PERCENTAGE } }),
            ]
          });
          children.push(
            new Paragraph({ children: [new TextRun({ text: `圖片 #${i + 1}`, bold: true, size: 28 })] }),
            new Table({ rows: [headerRow, contentRow], width: { size: 100, type: WidthType.PERCENTAGE } })
          );
        }
        if (i < cards.length - 1) {
          children.push(new Paragraph({ children: [new PageBreak()] }));
        }
      }
      const doc = new Document({ sections: [{ children }] });
      const blob = await Packer.toBlob(doc);
      const docxName = transOnly ? 'OCR_translated.docx' : 'OCR_results.docx';
      await saveFile(blob, docxName, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', '.docx');
    } catch (err) {
      console.error('DOCX export error:', err);
      showToast('DOCX 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: XLSX ---
  async function exportXlsx(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('XLSX 產生中…⏳');
    try {
      const header = transOnly ? ['圖片編號', '譯文'] : ['圖片編號', '原文', '譯文'];
      const data = [header];
      cards.forEach((card, i) => {
        const transPanel = card.querySelector('[data-type="trans"] .panel-content');
        const transText = transPanel ? transPanel.innerText : '';
        if (transOnly) {
          data.push([`#${i + 1}`, transText]);
        } else {
          const ocrPanel = card.querySelector('[data-type="ocr"] .panel-content');
          data.push([`#${i + 1}`, ocrPanel ? ocrPanel.innerText : '', transText]);
        }
      });
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = transOnly ? [{ wch: 10 }, { wch: 80 }] : [{ wch: 10 }, { wch: 60 }, { wch: 60 }];
      XLSX.utils.book_append_sheet(wb, ws, transOnly ? 'Translated' : 'OCR Results');
      const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const xlsxName = transOnly ? 'OCR_translated.xlsx' : 'OCR_results.xlsx';
      await saveFile(blob, xlsxName, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', '.xlsx');
    } catch (err) {
      console.error('XLSX export error:', err);
      showToast('XLSX 匯出失敗 ❌ ' + err.message);
    }
  }

  // ══════════════════════════════════
  // ── File / Paste / Drop Events ──
  // ══════════════════════════════════
  function handleFiles(files) {
    if (isProcessing) {
      showToast('批次處理中，請稍後再加入圖片 ⏳');
      return;
    }
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        addToQueue(file);
      }
    }
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });
  document.addEventListener('paste', e => {
    if (isProcessing) return;
    // Don't intercept paste when editing result panels
    if (e.target.closest('[contenteditable]')) return;
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    let intercepted = false;
    for (const item of items) {
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        addToQueue(item.getAsFile());
        intercepted = true;
      }
    }
    if (intercepted) e.preventDefault();
  });

  // ── Keyboard shortcut: Ctrl+Enter to translate with selected language ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !isProcessing && imageQueue.length > 0) {
      e.preventDefault();
      startSelectedLanguageBatch();
    }
  });

  // Initial state
  if (targetLangSelect) {
    const savedLang = localStorage.getItem(STORAGE_LANG_KEY);
    if (savedLang && [...targetLangSelect.options].some(opt => opt.value === savedLang)) {
      targetLangSelect.value = savedLang;
      lastUsedLang = savedLang;
    } else {
      lastUsedLang = targetLangSelect.value;
    }
    targetLangSelect.addEventListener('change', () => {
      lastUsedLang = targetLangSelect.value;
      localStorage.setItem(STORAGE_LANG_KEY, targetLangSelect.value);
    });
  }
  updateQueueUI();
  syncPolishUi();
  syncModeUi();
  refreshApiKeyCallout();
</script>
